name: Daily Inactive Pendle Tokens Update

# run at 00:30 UTC every day (adjust as needed)
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # so GitHub token is available to push

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate Pendle tokens list
        run: node scripts/generate-inactive-pendle-tokens.js

      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: daily update of Pendle tokens list"
          file_pattern: |
            lib/token-matcher/config/pendle/inactive-tokens.ts
          branch: main
          commit_user_name: github-actions
          commit_user_email: actions@github.com
          
