name: Daily Inactive Pendle Tokens Update

# run at 00:30 UTC every day (adjust as needed)
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes
        run: |
          git pull origin main --rebase || true

      - name: Generate Pendle tokens list
        run: node scripts/generate-inactive-pendle-tokens.js

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git add lib/token-matcher/config/pendle/inactive-tokens.ts
          git commit -m "chore: daily update of inactive Pendle tokens list"
          git pull origin main --rebase || true
          git push origin main
